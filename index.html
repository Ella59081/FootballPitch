<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/football-pitch/style.css">
</head>
<body>
    <div class="container">
        <div class="area">
            <div class="field child">
                <div class="first">
                    <div class="corner side"></div>
                    <div class="penalty">
                        <div class="goal other">
                            <div class="post">
                                <div class="in"></div>
                                <div class="dot"></div>
                            </div>
                            <div class="half"></div>
                        </div>
                        <div class="point"></div>
                    </div>
                    <div class="corner"></div>
                </div>
            </div>
            <div class="field end">
                <div class="dot middle"></div>
                <div class="first right">
                    <div class="right-corner"></div>
                    <div class="penalty different">
                        <div class="point face"></div>
                        <div class="goal free">
                            <div class="half remain"></div>
                            <div class="post facing">
                                <div class="dot"></div> 
                                <div class="in"></div>
                            </div>
                        </div>
                    </div>
                    <div class="bottom-corner"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
